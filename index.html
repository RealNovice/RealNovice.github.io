<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Johannes Lima Spielhofen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --glass: rgba(255,255,255,0.22);
      --glass-border: rgba(255,255,255,0.38);
      --text-main: #1d1d1f;
      --text-sub: rgba(29,29,31,0.6);
      --bg-start: #cfd0df;
      --bg-end: #eeeef5;
      --photo-size: 220px;
      --photo-size-lg: 380px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: linear-gradient(160deg, var(--bg-start) 0%, var(--bg-end) 100%);
      color: var(--text-main);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ── Background canvas ── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Orbs ── */
    .orb {
      position: fixed;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.45), rgba(200,200,255,0.15) 50%, transparent 75%);
      filter: blur(80px);
      z-index: 0;
      pointer-events: none;
    }

    /* ── Layout ── */
    .page {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 0 2rem 6rem;
      gap: 0;
    }

    /* ── Landing card ── */
    .landing {
      width: 100%;
      max-width: 860px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: calc(var(--photo-size-lg) / 2 + 5rem);
      position: relative;
    }

    .profile-card {
      background: var(--glass);
      backdrop-filter: blur(80px) saturate(250%);
      -webkit-backdrop-filter: blur(80px) saturate(250%);
      border: 1px solid var(--glass-border);
      border-radius: 40px;
      padding: calc(var(--photo-size-lg) / 2 + 2.5rem) 4rem 3.5rem;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      box-shadow:
        0 30px 80px rgba(0,0,0,0.1),
        0 10px 30px rgba(0,0,0,0.07),
        inset 0 1px 0 rgba(255,255,255,0.7),
        inset 0 -1px 0 rgba(255,255,255,0.3);
      position: relative;
      overflow: visible;
    }

    .profile-image {
      width: var(--photo-size-lg);
      height: var(--photo-size-lg);
      border-radius: 50%;
      overflow: hidden;
      border: 4px solid rgba(255,255,255,0.5);
      box-shadow:
        0 30px 60px rgba(0,0,0,0.18),
        inset 0 0 0 1px rgba(255,255,255,0.22);
      position: absolute;
      left: 50%;
      top: calc(-1 * (var(--photo-size-lg) / 2));
      transform: translateX(-50%);
      z-index: 3;
      will-change: transform;
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateX(-50%) translateY(0px); }
      50%       { transform: translateX(-50%) translateY(-12px); }
    }

    .profile-image img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }

    .profile-name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(2.4rem, 5vw, 3.8rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      text-align: center;
      color: var(--text-main);
    }

    .tagline {
      font-size: 0.95rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-sub);
      font-weight: 400;
    }

    /* ── Hi pane ── */
    .hi-section {
      width: 100%;
      max-width: 860px;
      margin-top: 3rem;
    }

    .pane {
      background: var(--glass);
      backdrop-filter: blur(80px) saturate(250%);
      -webkit-backdrop-filter: blur(80px) saturate(250%);
      border: 1px solid var(--glass-border);
      border-radius: 36px;
      padding: 4rem 4.5rem;
      width: 100%;
      box-shadow:
        0 25px 70px rgba(0,0,0,0.09),
        0 10px 30px rgba(0,0,0,0.05),
        inset 0 1px 0 rgba(255,255,255,0.7),
        inset 0 -1px 0 rgba(255,255,255,0.3);
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.8s cubic-bezier(0.4,0,0.2,1), transform 0.8s cubic-bezier(0.4,0,0.2,1);
    }

    .pane.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .pane h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(3rem, 7vw, 5rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      margin-bottom: 1.2rem;
      background: linear-gradient(135deg, var(--text-main), rgba(29,29,31,0.55));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .pane p {
      font-size: 1.15rem;
      line-height: 1.65;
      color: var(--text-sub);
      max-width: 560px;
    }

    footer {
      margin-top: 4rem;
      font-size: 0.85rem;
      color: rgba(29,29,31,0.4);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 500;
    }

    @media (max-width: 768px) {
      :root { --photo-size-lg: 200px; }
      .pane { padding: 3rem 2.5rem; }
      .profile-card { padding: calc(var(--photo-size-lg) / 2 + 2rem) 2.5rem 3rem; }
    }
  </style>
</head>
<body>

<!-- Animated background -->
<canvas id="bg-canvas"></canvas>

<!-- Soft orbs -->
<div class="orb" style="width:700px;height:700px;left:-200px;top:0%;opacity:0.7;"></div>
<div class="orb" style="width:500px;height:500px;right:-150px;top:40%;opacity:0.6;"></div>
<div class="orb" style="width:400px;height:400px;left:20%;bottom:5%;opacity:0.5;"></div>

<div class="page">

  <!-- Landing -->
  <div class="landing">
    <div class="profile-card">
      <div class="profile-image">
        <img src="profile.jpg" alt="Johannes Lima Spielhofen">
      </div>
      <h2 class="profile-name">Johannes Lima Spielhofen</h2>
      <span class="tagline">Per Aspera Ad Astra</span>
    </div>
  </div>

  <!-- Hi pane -->
  <div class="hi-section">
    <div class="pane" id="hiPane">
      <h1>Hi, I'm Johannes.</h1>
      <p>I'm currently building SheetCheater, an app designed to help you learn to read sheet music quicker and more easily.</p>
    </div>
  </div>

  <footer>© Johannes Lima Spielhofen</footer>

</div>

<script>
  // ── Geometric line network background ──
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');

  let W, H, nodes;

  const NODE_COUNT = 55;
  const MAX_DIST = 180;
  const SPEED = 0.28;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function initNodes() {
    nodes = Array.from({ length: NODE_COUNT }, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      vx: (Math.random() - 0.5) * SPEED,
      vy: (Math.random() - 0.5) * SPEED,
      r: Math.random() * 1.8 + 0.8,
    }));
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // Update positions
    nodes.forEach(n => {
      n.x += n.vx;
      n.y += n.vy;
      if (n.x < 0 || n.x > W) n.vx *= -1;
      if (n.y < 0 || n.y > H) n.vy *= -1;
    });

    // Draw edges
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const dx = nodes[i].x - nodes[j].x;
        const dy = nodes[i].y - nodes[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < MAX_DIST) {
          const alpha = (1 - dist / MAX_DIST) * 0.18;
          ctx.beginPath();
          ctx.moveTo(nodes[i].x, nodes[i].y);
          ctx.lineTo(nodes[j].x, nodes[j].y);
          ctx.strokeStyle = `rgba(80, 80, 120, ${alpha})`;
          ctx.lineWidth = 0.8;
          ctx.stroke();
        }
      }
    }

    // Draw nodes
    nodes.forEach(n => {
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(90, 90, 140, 0.35)';
      ctx.fill();
    });

    requestAnimationFrame(draw);
  }

  resize();
  initNodes();
  draw();
  window.addEventListener('resize', () => { resize(); initNodes(); });

  // ── Scroll reveal for hi pane ──
  const hiPane = document.getElementById('hiPane');
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.15 });
  obs.observe(hiPane);

  // Show pane immediately if already in view on load
  setTimeout(() => {
    const rect = hiPane.getBoundingClientRect();
    if (rect.top < window.innerHeight) hiPane.classList.add('visible');
  }, 100);
</script>

</body>
</html>
