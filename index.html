<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Johannes Lima Spielhofen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --glass: rgba(255,255,255,0.22);
      --glass-border: rgba(255,255,255,0.40);
      --text-main: #1d1d1f;
      --text-sub: rgba(29,29,31,0.60);
      --bg-start: #cfd0df;
      --bg-end:   #eeeef5;
      --photo: 340px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: auto; }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: linear-gradient(160deg, var(--bg-start) 0%, var(--bg-end) 100%);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
      height: 350vh;
    }

    #bg-canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
    }

    .orb {
      position: fixed; border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.45), rgba(200,200,255,0.15) 50%, transparent 75%);
      filter: blur(80px); z-index: 0; pointer-events: none;
    }

    .scene-wrap {
      position: sticky; top: 0;
      height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 1; overflow: hidden;
    }

    /* photo */
    .photo-wrap {
      position: absolute;
      top: calc(50% - var(--photo) * 0.85);
      left: 50%;
      transform: translateX(-50%);
      width: var(--photo); height: var(--photo);
      border-radius: 50%; overflow: hidden;
      border: 4px solid rgba(255,255,255,0.55);
      box-shadow: 0 30px 70px rgba(0,0,0,0.20), inset 0 0 0 1px rgba(255,255,255,0.25);
      z-index: 10;
      animation: float 6s ease-in-out infinite;
      will-change: transform;
    }

    @keyframes float {
      0%,100% { transform: translateX(-50%) translateY(0);   }
      50%      { transform: translateX(-50%) translateY(-6px);}
    }

    .photo-wrap img { width:100%; height:100%; object-fit:cover; display:block; }

    /* card */
    .card-scene {
      width: min(860px, 92vw);
      margin-top: calc(var(--photo) * 0.44);
      perspective: 1400px;
      perspective-origin: 50% 25%;
      position: relative; z-index: 5;
    }

    .card-flipper {
      width: 100%;
      transform-style: preserve-3d;
      /* snappy spring-like transition */
      transition: transform 0.65s cubic-bezier(0.34, 1.56, 0.64, 1);
      will-change: transform;
    }

    /* slid-down state – added by JS */
    .card-flipper.slid {
      transform: translateY(72px) rotateX(0deg);
    }

    /* flipped state – added by JS */
    .card-flipper.flipped {
      transform: translateY(72px) rotateX(180deg);
    }

    /* default: no slide, no flip */
    .card-flipper:not(.slid):not(.flipped) {
      transform: translateY(0px) rotateX(0deg);
    }

    .card-face {
      width: 100%;
      background: var(--glass);
      backdrop-filter: blur(80px) saturate(260%);
      -webkit-backdrop-filter: blur(80px) saturate(260%);
      border: 1px solid var(--glass-border);
      border-radius: 40px;
      box-shadow:
        0 30px 80px rgba(0,0,0,0.10),
        0 10px 30px rgba(0,0,0,0.07),
        inset 0 1px 0 rgba(255,255,255,0.72),
        inset 0 -1px 0 rgba(255,255,255,0.32);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex; flex-direction: column; align-items: center;
    }

    .card-front {
      padding: calc(var(--photo) * 0.54 + 1rem) 4rem 3.5rem;
    }

    .profile-name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(2.2rem, 5vw, 3.6rem);
      font-weight: 700; letter-spacing: -0.02em;
      text-align: center; color: var(--text-main);
    }

    .tagline {
      margin-top: 0.65rem;
      font-size: 0.88rem; letter-spacing: 0.20em;
      text-transform: uppercase; color: var(--text-sub);
    }

    .card-back {
      position: absolute; top: 0; left: 0; height: 100%;
      padding: 4rem 4.5rem;
      transform: rotateX(180deg);
      align-items: flex-start;
    }

    .card-back h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(3rem, 7vw, 5rem);
      font-weight: 700; letter-spacing: -0.04em; line-height: 1.05;
      margin-bottom: 1.3rem;
      background: linear-gradient(135deg, var(--text-main), rgba(29,29,31,0.50));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .card-back p {
      font-size: 1.15rem; line-height: 1.7;
      color: var(--text-sub); max-width: 540px;
    }

    /* scroll hint */
    .scroll-hint {
      position: fixed; bottom: 2.5rem; left: 50%;
      transform: translateX(-50%);
      font-size: 0.80rem; letter-spacing: 0.14em;
      text-transform: uppercase; color: rgba(29,29,31,0.38);
      z-index: 20; display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
      transition: opacity 0.4s;
    }
    .scroll-hint svg { animation: bounceDown 1.8s ease-in-out infinite; }
    @keyframes bounceDown {
      0%,100% { transform: translateY(0);   }
      50%      { transform: translateY(7px); }
    }

    footer {
      position: fixed; bottom: 1.2rem; right: 2rem;
      font-size: 0.78rem; letter-spacing: 0.06em;
      text-transform: uppercase; color: rgba(29,29,31,0.28); z-index: 20;
    }

    @media (max-width: 600px) {
      :root { --photo: 190px; }
      .card-front { padding: calc(var(--photo) * 0.54 + 1rem) 2.2rem 2.8rem; }
      .card-back  { padding: 3rem 2.2rem; }
    }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="orb" style="width:700px;height:700px;left:-200px;top:0;opacity:.7;"></div>
<div class="orb" style="width:500px;height:500px;right:-150px;top:38%;opacity:.6;"></div>
<div class="orb" style="width:380px;height:380px;left:22%;bottom:4%;opacity:.5;"></div>

<div class="scene-wrap">
  <div class="photo-wrap">
    <img src="profile.jpg" alt="Johannes Lima Spielhofen">
  </div>

  <div class="card-scene">
    <div class="card-flipper" id="flipper">

      <div class="card-face card-front">
        <div class="profile-name">Johannes Lima Spielhofen</div>
        <div class="tagline">Per Aspera Ad Astra</div>
      </div>

      <div class="card-face card-back">
        <h1>Hi, I'm Johannes.</h1>
        <p>I'm currently building SheetCheater, an app designed to help you learn to read sheet music quicker and more easily.</p>
      </div>

    </div>
  </div>
</div>

<div class="scroll-hint" id="scrollHint">
  <span>scroll</span>
  <svg width="16" height="22" viewBox="0 0 16 22" fill="none">
    <rect x="1" y="1" width="14" height="20" rx="7" stroke="rgba(29,29,31,0.35)" stroke-width="1.4"/>
    <circle cx="8" cy="6" r="2" fill="rgba(29,29,31,0.35)">
      <animate attributeName="cy" values="6;12;6" dur="1.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.3;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
  </svg>
</div>

<footer>© Johannes Lima Spielhofen</footer>

<script>
// ── Background network ──
const canvas = document.getElementById('bg-canvas');
const ctx    = canvas.getContext('2d');
let W, H, nodes;
const N=55, MAXD=180, SPD=0.28;
function resize(){ W=canvas.width=innerWidth; H=canvas.height=innerHeight; }
function initNodes(){
  nodes=Array.from({length:N},()=>({
    x:Math.random()*W, y:Math.random()*H,
    vx:(Math.random()-.5)*SPD, vy:(Math.random()-.5)*SPD,
    r:Math.random()*1.6+.7
  }));
}
function drawBg(){
  ctx.clearRect(0,0,W,H);
  nodes.forEach(n=>{
    n.x+=n.vx; n.y+=n.vy;
    if(n.x<0||n.x>W) n.vx*=-1;
    if(n.y<0||n.y>H) n.vy*=-1;
  });
  for(let i=0;i<nodes.length;i++) for(let j=i+1;j<nodes.length;j++){
    const dx=nodes[i].x-nodes[j].x, dy=nodes[i].y-nodes[j].y, d=Math.sqrt(dx*dx+dy*dy);
    if(d<MAXD){
      ctx.beginPath(); ctx.moveTo(nodes[i].x,nodes[i].y); ctx.lineTo(nodes[j].x,nodes[j].y);
      ctx.strokeStyle=`rgba(80,80,120,${(1-d/MAXD)*.15})`; ctx.lineWidth=.8; ctx.stroke();
    }
  }
  nodes.forEach(n=>{ ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2); ctx.fillStyle='rgba(90,90,140,0.28)'; ctx.fill(); });
  requestAnimationFrame(drawBg);
}
resize(); initNodes(); drawBg();
window.addEventListener('resize',()=>{ resize(); initNodes(); });


// ── Snap flip on scroll ──
const flipper    = document.getElementById('flipper');
const scrollHint = document.getElementById('scrollHint');

// Two thresholds: scroll past FLIP_AT → flip; scroll back below UNFLIP_AT → unflip (hysteresis)
const FLIP_AT   = window.innerHeight * 0.55;
const UNFLIP_AT = window.innerHeight * 0.25;

let isFlipped = false;

function onScroll(){
  const sy = window.scrollY;

  if (!isFlipped && sy > FLIP_AT) {
    isFlipped = true;
    flipper.classList.add('slid', 'flipped');
  } else if (isFlipped && sy < UNFLIP_AT) {
    isFlipped = false;
    flipper.classList.remove('flipped');
    // slight delay before re-tucking under photo
    setTimeout(() => { flipper.classList.remove('slid'); }, 320);
  }

  scrollHint.style.opacity = sy > 30 ? '0' : '1';
}

window.addEventListener('scroll', onScroll, {passive:true});
onScroll();
</script>
</body>
</html>
